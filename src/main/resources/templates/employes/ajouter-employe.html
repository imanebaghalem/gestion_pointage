<!-- CONTENT -->

<div class="content">

    <div class="form-card">

        <h4 class="title">
            <i class="fa-solid fa-user-plus"></i>
            Ajouter un employé
        </h4>

        <form>

            <div class="row">

                <!-- NOM -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Nom
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            id="nom"
                            placeholder="Nom de l'employé"
                    >

                </div>

                <!-- PRENOM -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Prénom
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            id="prenom"
                            placeholder="Prénom"
                    >

                </div>

                <!-- EMAIL -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                            type="email"
                            class="form-control"
                            id="email"
                            placeholder="email@example.com"
                    >

                </div>

                <!-- TELEPHONE -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Téléphone
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            placeholder="+212..."
                    >

                </div>

                <!-- POSTE -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Poste
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            placeholder="Ex: Agent administratif"
                    >

                </div>

                <!-- DATE -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Date d'embauche
                    </label>

                    <input
                            type="date"
                            class="form-control"
                    >

                </div>

            </div>

            <!-- QR SECTION -->

            <div class="qr-section">

                <label class="form-label">
                    QR Code Employé
                </label>

                <br>

                <button
                        type="button"
                        class="btn btn-secondary mb-3"
                        onclick="generateQR()"
                >
                    <i class="fa-solid fa-qrcode"></i>
                    Générer QR Code
                </button>

                <br>

                <div id="qrcode"></div>

            </div>

            <!-- BUTTON SAVE -->

            <div class="mt-4">

                <button type="submit" class="btn btn-primary">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Enregistrer

                </button>

            </div>

        </form>

    </div>

</div>

<!-- SCRIPT -->

<script>

    function generateQR() {

        let nom = document.getElementById("nom").value.trim();

        let prenom = document.getElementById("prenom").value.trim();

        let email = document.getElementById("email").value.trim();

        // CHECK EMPTY

        if (nom === "" || prenom === "" || email === "") {

            alert("⚠️ Remplir tous les champs avant de générer QR");

            return;
        }

        // DATA

        let data =
            `Nom: ${nom}
Prénom: ${prenom}
Email: ${email}`;

        let qrDiv = document.getElementById("qrcode");

        // CLEAR OLD QR

        qrDiv.innerHTML = "";

        // CREATE QR

        new QRCode(qrDiv, {

            text: data,

            width: 180,

            height: 180,

            colorDark: "#000000",

            colorLight: "#ffffff",

            correctLevel: QRCode.CorrectLevel.H

        });

    }

</script>
